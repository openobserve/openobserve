[package]
name = "openobserve-core"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []
enterprise = [
    "dep:aws-config",
    "dep:aws-credential-types",
    "dep:o2_dex",
    "dep:o2_enterprise",
    "dep:o2_openfga",
    "common/enterprise",
    "config/enterprise",
    "promql/enterprise",
    "search/enterprise",
    "openobserve-alerts/enterprise",
    "openobserve-pipeline/enterprise",
    "openobserve-transform/enterprise",
    "openobserve-scheduler/enterprise",
    "openobserve-compactor/enterprise",
    "openobserve-dashboards/enterprise",
    "openobserve-reports/enterprise",
    "openobserve-search-service/enterprise",
]
cloud = [
    "infra/cloud",
    "enterprise",
    "o2_enterprise/cloud",
    "common/cloud",
]
vectorscan = ["o2_enterprise/vectorscan", "search/vectorscan"]
vortex = [
    "dep:vortex",
    "config/vortex",
    "o2_enterprise?/vortex",
    "search/vortex",
]

