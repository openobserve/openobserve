[package]
name = "openobserve-organization"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []
enterprise = [
    "dep:aws-config",
    "dep:aws-credential-types",
    "dep:object_store",
    "common/enterprise",
    "config/enterprise",
    "dep:o2_enterprise",
    "dep:o2_dex",
    "dep:o2_openfga",
    "openobserve-alerts/enterprise",
    "openobserve-compactor/enterprise",
    "openobserve-pipeline/enterprise",
    "openobserve-search-service/enterprise",
    "openobserve-self-reporting/enterprise",
]
cloud = [
    "enterprise",
    "common/cloud",
    "o2_enterprise/cloud",
    "openobserve-alerts/cloud",
    "openobserve-compactor/cloud",
    "openobserve-pipeline/cloud",
    "openobserve-search-service/cloud",
    "openobserve-self-reporting/cloud",
]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
aws-config = { workspace = true, optional = true }
aws-credential-types = { workspace = true, optional = true }
axum.workspace = true
base64.workspace = true
bytes.workspace = true
chrono.workspace = true
common.workspace = true
config.workspace = true
hashbrown.workspace = true
infra.workspace = true
http.workspace = true
jsonwebtoken.workspace = true
lettre.workspace = true
log.workspace = true
o2_enterprise = { workspace = true, optional = true, default-features = false }
o2_dex = { workspace = true, optional = true }
o2_openfga = { workspace = true, optional = true }
object_store = { workspace = true, optional = true }
openobserve-alerts.workspace = true
openobserve-compactor.workspace = true
openobserve-ingestion.workspace = true
openobserve-pipeline.workspace = true
openobserve-search-service.workspace = true
openobserve-self-reporting.workspace = true
sea-orm.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
thiserror.workspace = true
utoipa.workspace = true
url.workspace = true
version-compare.workspace = true
