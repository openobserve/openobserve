# Create the real Secret out-of-band using your secrets convention
# (plain Secret / External Secrets Operator / Azure Key Vault CSI). The server and
# migrate Job consume it via `envFrom: secretRef: name: kinora-secrets`.
#
# Quick manual create (replace placeholders; AUTH_SECRET = `openssl rand -hex 32`):
#
#   kubectl -n kinora create secret generic kinora-secrets \
#     --from-literal=AUTH_SECRET='<openssl rand -hex 32>' \
#     --from-literal=POSTGRES_PASSWORD='<db password>' \
#     --from-literal=S3_ACCESS_KEY_ID='<s3 key id>' \
#     --from-literal=S3_SECRET_ACCESS_KEY='<s3 secret>'
#
apiVersion: v1
kind: Secret
metadata:
  name: kinora-secrets
type: Opaque
stringData:
  AUTH_SECRET: "CHANGE_ME_openssl_rand_hex_32"
  POSTGRES_PASSWORD: "CHANGE_ME"
  S3_ACCESS_KEY_ID: "CHANGE_ME"
  S3_SECRET_ACCESS_KEY: "CHANGE_ME"
