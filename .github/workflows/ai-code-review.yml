name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string
      force_full:
        description: "Force full review tier (ignore risk assessment)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scripts/ai-review/package-lock.json

      - name: Install AI review dependencies
        working-directory: scripts/ai-review
        run: npm ci

      - name: Install opencode
        env:
          # Pinned so an upstream opencode release can't silently change review behavior
          # (agent/tool semantics, prompt handling) underneath this workflow. Bump
          # deliberately after testing against scripts/ai-review locally.
          OPENCODE_VERSION: "1.17.13"
        run: |
          curl -fsSL https://opencode.ai/install | bash -s -- --version "$OPENCODE_VERSION"
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Set trace ID
        run: echo "O2_TRACE_ID=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Set PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for skip marker
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
            echo "force_full=${{ github.event.inputs.force_full || 'false' }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check PR body and comments for skip markers
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null || echo "")
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[].body' 2>/dev/null || echo "")

          if echo "$PR_BODY$COMMENTS" | grep -qiE '\[skip (ai )?review\]|\[skip ci\]|break glass'; then
            echo "Skip marker found. Skipping AI review."
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
          fi
          echo "force_full=false" >> "$GITHUB_OUTPUT"

      - name: Run AI Code Review
        if: steps.skip.outputs.skip_review == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          FORCE_FULL: ${{ steps.skip.outputs.force_full }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          O2_TRACE_INGEST_URL: ${{ secrets.O2_TRACE_INGEST_URL }}
          O2_TRACE_ORG: ${{ secrets.O2_TRACE_ORG }}
          O2_TRACE_USERNAME: ${{ secrets.O2_TRACE_USERNAME }}
          O2_TRACE_PASSWORD: ${{ secrets.O2_TRACE_PASSWORD }}
          O2_TRACE_AUTH: ${{ secrets.O2_TRACE_AUTH }}
          O2_TRACE_STREAM: ${{ secrets.O2_TRACE_STREAM }}
          O2_TRACE_EXPORT_TIMEOUT_MS: ${{ vars.O2_TRACE_EXPORT_TIMEOUT_MS }}
          O2_TRACE_EXPORT_BATCH_SIZE: ${{ vars.O2_TRACE_EXPORT_BATCH_SIZE }}
        run: node scripts/ai-review/run-review.mjs

      - name: Log skip
        if: steps.skip.outputs.skip_review == 'true'
        run: echo "AI Code Review skipped due to skip marker or break glass"
