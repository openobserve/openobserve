name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string
      force_full:
        description: "Force full review tier (ignore risk assessment)"
        required: false
        type: boolean
        default: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Concurrency is per-job (not workflow-level) so it can see `matrix`: keyed per-PR AND
    # per-provider, the glm and deepseek legs get independent groups and don't cancel each other.
    concurrency:
      group: ai-review-${{ matrix.provider.name }}-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    strategy:
      # Run both providers even if one fails, and let one provider's failure not sink the other.
      fail-fast: false
      matrix:
        # One-week head-to-head: GLM-5.2 vs DeepSeek-V4-Pro, each posting its own PR comment.
        # Adding a provider? Also add its `marker` to ALL_REVIEW_MARKERS in run-review.mjs,
        # or the other legs will claim and overwrite this one's comment.
        provider:
          - name: glm
            label: GLM-5.2
            provider_id: zai
            model_id: glm-5.2
            model_variant: max
            api_key_env: GLM_API_KEY
            agent_prefix: ai-review
            marker: "<!-- ai-code-review -->"
          - name: deepseek
            label: DeepSeek-V4-Pro
            provider_id: deepseek-review
            model_id: deepseek-v4-pro
            model_variant: ""
            api_key_env: DEEPSEEK_API_KEY
            agent_prefix: ai-review-deepseek
            marker: "<!-- ai-code-review-deepseek -->"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scripts/ai-review/package-lock.json

      - name: Install AI review dependencies
        working-directory: scripts/ai-review
        run: npm ci

      - name: Install opencode
        env:
          # Pinned so an upstream opencode release can't silently change review behavior
          # (agent/tool semantics, prompt handling) underneath this workflow. Bump
          # deliberately after testing against scripts/ai-review locally.
          OPENCODE_VERSION: "1.17.13"
        run: |
          curl -fsSL https://opencode.ai/install | bash -s -- --version "$OPENCODE_VERSION"
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Set trace ID
        run: echo "O2_TRACE_ID=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Set PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for skip marker
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
            echo "force_full=${{ github.event.inputs.force_full || 'false' }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check PR body and comments for skip markers
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null || echo "")
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[].body' 2>/dev/null || echo "")

          if echo "$PR_BODY$COMMENTS" | grep -qiE '\[skip (ai )?review\]|\[skip ci\]|break glass'; then
            echo "Skip marker found. Skipping AI review."
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
          fi
          echo "force_full=false" >> "$GITHUB_OUTPUT"

      - name: Run AI Code Review
        if: steps.skip.outputs.skip_review == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          FORCE_FULL: ${{ steps.skip.outputs.force_full }}
          # Provider selection for this matrix leg (see run-review.mjs for how these are used).
          REVIEW_PROVIDER_ID: ${{ matrix.provider.provider_id }}
          REVIEW_MODEL_ID: ${{ matrix.provider.model_id }}
          REVIEW_MODEL_VARIANT: ${{ matrix.provider.model_variant }}
          REVIEW_API_KEY_ENV: ${{ matrix.provider.api_key_env }}
          REVIEW_AGENT_PREFIX: ${{ matrix.provider.agent_prefix }}
          REVIEW_LABEL: ${{ matrix.provider.label }}
          REVIEW_MARKER: ${{ matrix.provider.marker }}
          # Both keys are provided; run-review.mjs reads only the one named by REVIEW_API_KEY_ENV.
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          O2_TRACE_INGEST_URL: ${{ secrets.O2_TRACE_INGEST_URL }}
          O2_TRACE_ORG: ${{ secrets.O2_TRACE_ORG }}
          O2_TRACE_USERNAME: ${{ secrets.O2_TRACE_USERNAME }}
          O2_TRACE_PASSWORD: ${{ secrets.O2_TRACE_PASSWORD }}
          O2_TRACE_AUTH: ${{ secrets.O2_TRACE_AUTH }}
          O2_TRACE_STREAM: ${{ secrets.O2_TRACE_STREAM }}
          O2_TRACE_EXPORT_TIMEOUT_MS: ${{ vars.O2_TRACE_EXPORT_TIMEOUT_MS }}
          O2_TRACE_EXPORT_BATCH_SIZE: ${{ vars.O2_TRACE_EXPORT_BATCH_SIZE }}
        run: node scripts/ai-review/run-review.mjs

      - name: Log skip
        if: steps.skip.outputs.skip_review == 'true'
        run: echo "AI Code Review skipped due to skip marker or break glass"
