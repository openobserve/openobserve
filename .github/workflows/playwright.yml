                "region.spec.js",
              ]
          - testfolder: "Alerts"
            browser: "chrome"
            run_files: [
                # "alerts-e2e-flow.spec.js",
                "alerts-ui-operations.spec.js",
                "alerts-import.spec.js",
                # "alerts-advanced.spec.js",
                # "alerts-scheduled-features.spec.js",
                "alerts-metrics-notification.spec.js",
