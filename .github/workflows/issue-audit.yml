name: Issue Audit - Check Fix & Test Coverage

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      test_mode:
        description: 'Test mode - limit to specific issues (comma-separated issue numbers, or "all" for full audit)'
        required: false
        default: 'all'
        type: string
      dry_run:
        description: 'Dry run - do not close issues or post comments, only generate report'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  audit-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all open issues
        id: fetch-issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',  // Only audit bug issues
              per_page: 100
            });

            // Filter out PRs (GitHub API returns both)
            const bugIssues = issues.filter(issue => !issue.pull_request);

            core.setOutput('count', bugIssues.length);
            core.setOutput('issues', JSON.stringify(bugIssues.map(i => ({
              number: i.number,
              title: i.title,
              url: i.html_url,
              created_at: i.created_at
            }))));

            console.log(`Found ${bugIssues.length} open bug issues to audit`);

      - name: Audit each issue for fix + test coverage
        id: audit
        uses: actions/github-script@v7
        env:
          ISSUES_JSON: ${{ steps.fetch-issues.outputs.issues }}
          TEST_MODE: ${{ inputs.test_mode }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let issues = JSON.parse(process.env.ISSUES_JSON);

            // Apply test mode filter if specified
            const testMode = process.env.TEST_MODE || 'all';
            if (testMode !== 'all' && testMode !== '') {
              const testIssueNumbers = testMode.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
              if (testIssueNumbers.length > 0) {
                console.log(`\n🧪 TEST MODE: Filtering to issues: ${testIssueNumbers.join(', ')}`);
                issues = issues.filter(i => testIssueNumbers.includes(i.number));
                console.log(`Filtered to ${issues.length} issue(s)\n`);
              }
            }

            const results = {
              ready_to_close: [],      // Has fix + test
              needs_test: [],          // Has fix, no test
              needs_fix: [],           // Has test, no fix (weird case)
              needs_both: []           // No fix, no test
            };

            for (const issue of issues) {
              console.log(`\n=== Auditing Issue #${issue.number}: ${issue.title} ===`);

              // 1. Check for merged PR that fixes this issue
              let hasFix = false;
              let fixPR = null;

              try {
                const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  per_page: 100
                });

                // Look for "referenced" events from merged PRs
                for (const event of timeline) {
                  if (event.event === 'referenced' && event.source?.type === 'issue') {
                    // Check if the referencing PR is merged
                    const prNumber = event.source.issue.number;
                    const pr = await github.rest.pulls.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber
                    });

                    if (pr.data.merged) {
                      // Check if PR body mentions this issue with closing keywords
                      const prBody = (pr.data.body || '').toLowerCase();
                      const issueRef = `#${issue.number}`;
                      const closingKeywords = ['closes', 'fixes', 'resolves', 'fixed', 'close', 'resolve'];

                      if (closingKeywords.some(keyword =>
                        prBody.includes(`${keyword} ${issueRef}`) ||
                        prBody.includes(`${keyword}: ${issueRef}`)
                      )) {
                        hasFix = true;
                        fixPR = {
                          number: pr.data.number,
                          title: pr.data.title,
                          url: pr.data.html_url,
                          merged_at: pr.data.merged_at
                        };
                        console.log(`  ✓ Found fix: PR #${fixPR.number}`);
                        break;
                      }
                    }
                  }
                }
              } catch (error) {
                console.log(`  ⚠️  Error checking PRs: ${error.message}`);
              }

              // 2. Check for test with @bug-{issue#} tag
              const { execSync } = require('child_process');
              let hasTest = false;
              let testFile = null;

              try {
                const searchResult = execSync(
                  `grep -r "@bug-${issue.number}" tests/ui-testing/playwright-tests/ --include="*.spec.js" -l || true`,
                  { encoding: 'utf-8' }
                ).trim();

                if (searchResult) {
                  hasTest = true;
                  testFile = searchResult.split('\n')[0];  // Take first match
                  console.log(`  ✓ Found test: ${testFile}`);
                } else {
                  console.log(`  ✗ No test found with @bug-${issue.number}`);
                }
              } catch (error) {
                console.log(`  ⚠️  Error checking tests: ${error.message}`);
              }

              // 3. Categorize the issue
              const result = {
                issue: issue,
                hasFix: hasFix,
                hasTest: hasTest,
                fixPR: fixPR,
                testFile: testFile
              };

              if (hasFix && hasTest) {
                console.log(`  → Category: READY TO CLOSE`);
                results.ready_to_close.push(result);
              } else if (hasFix && !hasTest) {
                console.log(`  → Category: NEEDS TEST`);
                results.needs_test.push(result);
              } else if (!hasFix && hasTest) {
                console.log(`  → Category: NEEDS FIX (has test but no merged PR)`);
                results.needs_fix.push(result);
              } else {
                console.log(`  → Category: NEEDS BOTH`);
                results.needs_both.push(result);
              }
            }

            // Log summary
            console.log(`\n=== AUDIT SUMMARY ===`);
            console.log(`Total issues audited: ${issues.length}`);
            console.log(`Ready to close: ${results.ready_to_close.length}`);
            console.log(`Needs test: ${results.needs_test.length}`);
            console.log(`Needs fix: ${results.needs_fix.length}`);
            console.log(`Needs both: ${results.needs_both.length}`);

            // Save results
            core.setOutput('results', JSON.stringify(results));
            core.setOutput('ready_to_close_count', results.ready_to_close.length);

      - name: Auto-close issues with fix + test
        if: ${{ steps.audit.outputs.ready_to_close_count > 0 && !inputs.dry_run }}
        uses: actions/github-script@v7
        env:
          RESULTS_JSON: ${{ steps.audit.outputs.results }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = JSON.parse(process.env.RESULTS_JSON);

            for (const item of results.ready_to_close) {
              const issue = item.issue;
              const fixPR = item.fixPR;
              const testFile = item.testFile;

              console.log(`Closing issue #${issue.number}: ${issue.title}`);

              // Post closing comment
              const commentLines = [
                '## ✅ Issue Resolved - Auto-Closed by Issue Audit',
                '',
                'This issue has been automatically closed because:',
                `- ✅ **Fix merged**: PR #${fixPR.number} (${fixPR.url})`,
                `- ✅ **Test coverage**: \`${testFile}\``,
                '',
                `The fix has been implemented and proper test coverage exists with the \`@bug-${issue.number}\` tag.`,
                '',
                '---',
                `*🤖 Automated by [Issue Audit Workflow](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`
              ];
              const comment = commentLines.join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });

              // Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });

              console.log(`  ✓ Closed issue #${issue.number}`);
            }

      - name: Analyze PR files for automation needs
        id: analyze-files
        if: ${{ !inputs.dry_run }}
        uses: actions/github-script@v7
        env:
          RESULTS_JSON: ${{ steps.audit.outputs.results }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = JSON.parse(process.env.RESULTS_JSON);

            // Helper function to categorize a single file
            function categorizeFile(filename) {
              const docPatterns = [
                /\.md$/i, /\.yml$/i, /\.yaml$/i, /\.toml$/i, /\.lock$/i, /\.json$/i,
                /^LICENSE/i, /^README/i, /^CHANGELOG/i, /^\.gitignore$/,
                /^\.github\/.*\.md$/
              ];

              const codePatterns = [
                /\.rs$/i, /\.js$/i, /\.ts$/i, /\.tsx$/i, /\.vue$/i, /\.go$/i,
                /\.py$/i, /\.java$/i, /\.cpp$/i, /\.c$/i, /\.h$/i
              ];

              if (docPatterns.some(pattern => pattern.test(filename))) {
                return 'documentation';
              }

              if (codePatterns.some(pattern => pattern.test(filename))) {
                return 'code';
              }

              return 'other';
            }

            // Helper function to analyze PR files
            async function analyzePR(prNumber) {
              console.log(`  Fetching files for PR #${prNumber}...`);

              try {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100
                });

                console.log(`  Found ${files.length} changed files`);

                const analysis = {
                  totalFiles: files.length,
                  totalChanges: 0,
                  codeFiles: [],
                  docFiles: [],
                  otherFiles: [],
                  summary: {
                    hasCode: false,
                    hasDocOnly: false,
                    isSmallChange: false
                  }
                };

                for (const file of files) {
                  const category = categorizeFile(file.filename);
                  const changes = file.additions + file.deletions;

                  analysis.totalChanges += changes;

                  const fileInfo = {
                    filename: file.filename,
                    additions: file.additions,
                    deletions: file.deletions,
                    changes: changes,
                    status: file.status
                  };

                  if (category === 'code') {
                    analysis.codeFiles.push(fileInfo);
                  } else if (category === 'documentation') {
                    analysis.docFiles.push(fileInfo);
                  } else {
                    analysis.otherFiles.push(fileInfo);
                  }
                }

                analysis.summary.hasCode = analysis.codeFiles.length > 0;
                analysis.summary.hasDocOnly =
                  analysis.codeFiles.length === 0 &&
                  analysis.docFiles.length > 0;
                analysis.summary.isSmallChange = analysis.totalChanges < 5;

                return analysis;

              } catch (error) {
                console.log(`  Error fetching files: ${error.message}`);
                return null;
              }
            }

            const enrichedResults = [];

            for (const item of results.needs_test) {
              console.log(`\nAnalyzing PR #${item.fixPR.number}: ${item.fixPR.title}`);

              const analysis = await analyzePR(item.fixPR.number);

              if (analysis) {
                console.log(`  Code files: ${analysis.codeFiles.length}`);
                console.log(`  Doc files: ${analysis.docFiles.length}`);
                console.log(`  Total changes: ${analysis.totalChanges} lines`);
                console.log(`  Needs automation: ${analysis.summary.hasCode ? 'YES' : 'NO'}`);

                enrichedResults.push({
                  ...item,
                  fileAnalysis: analysis
                });
              } else {
                console.log(`  Analysis failed, defaulting to 'needs automation'`);
                enrichedResults.push({
                  ...item,
                  fileAnalysis: null
                });
              }
            }

            core.setOutput('enriched_needs_test', JSON.stringify(enrichedResults));
            core.setOutput('count', enrichedResults.length);

            console.log(`\n=== FILE ANALYSIS COMPLETE ===`);
            console.log(`Total issues analyzed: ${enrichedResults.length}`);

      - name: Process issues needing tests with smart categorization
        if: ${{ !inputs.dry_run && steps.analyze-files.outputs.count > 0 }}
        uses: actions/github-script@v7
        env:
          ENRICHED_ITEMS_JSON: ${{ steps.analyze-files.outputs.enriched_needs_test }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const enrichedItems = JSON.parse(process.env.ENRICHED_ITEMS_JSON);

            for (const item of enrichedItems) {
              const issue = item.issue;
              const fixPR = item.fixPR;
              const analysis = item.fileAnalysis;

              console.log(`\nProcessing issue #${issue.number}: ${issue.title}`);

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });

              const alreadyCommented = comments.some(c =>
                c.body.includes('Issue Audit Workflow') &&
                (c.body.includes('needs test coverage') || c.body.includes('Auto-Closed'))
              );

              if (alreadyCommented) {
                console.log(`  Already processed, skipping`);
                continue;
              }

              let needsAutomation = true;
              let reasoning = '';

              if (analysis && analysis.summary.hasDocOnly) {
                needsAutomation = false;
                reasoning = 'Only documentation/configuration files were changed';
              } else if (analysis && analysis.summary.isSmallChange && !analysis.summary.hasCode) {
                needsAutomation = false;
                reasoning = 'Very small change (<5 lines) with no code files';
              } else if (!analysis) {
                needsAutomation = true;
                reasoning = 'Could not analyze PR files - defaulting to requiring tests';
              } else {
                needsAutomation = true;
                reasoning = 'Code files were changed';
              }

              console.log(`  Decision: ${needsAutomation ? 'NEEDS AUTOMATION' : 'DOC ONLY'}`);
              console.log(`  Reasoning: ${reasoning}`);

              if (needsAutomation) {
                let filesList = '';
                if (analysis && analysis.codeFiles.length > 0) {
                  filesList = '\n\n**Changed code files:**\n';
                  analysis.codeFiles.slice(0, 10).forEach(f => {
                    filesList += `- \`${f.filename}\` (+${f.additions}/-${f.deletions})\n`;
                  });
                  if (analysis.codeFiles.length > 10) {
                    filesList += `- ... and ${analysis.codeFiles.length - 10} more\n`;
                  }
                }

                const commentLines = [
                  '## ⚠️  Missing Test Coverage - Automation Required',
                  '',
                  '**Status**: This issue has been fixed but lacks E2E test coverage.',
                  '',
                  `- ✅ **Fix merged**: PR #${fixPR.number} (${fixPR.url})`,
                  `- ❌ **No test found**: Missing \`@bug-${issue.number}\` tag`,
                  `- 🔍 **Analysis**: ${reasoning}`,
                  filesList,
                  '',
                  '**Action needed**:',
                  'Please add an E2E test with proper tags:',
                  '```javascript',
                  `test("Test description @bug-${issue.number} @regression", async ({ page }) => {`,
                  '  // Test implementation',
                  '});',
                  '```',
                  '',
                  'Place the test in `tests/ui-testing/playwright-tests/RegressionSet/`',
                  '',
                  '---',
                  `*🤖 Detected by [Issue Audit Workflow](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`
                ];
                const comment = commentLines.join('\n');

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: comment
                });

                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['Needs Automation']
                  });
                  console.log(`  ✓ Added "Needs Automation" label`);
                } catch (error) {
                  console.log(`  ⚠️  Could not add label: ${error.message}`);
                }

                console.log(`  ✓ Posted automation request comment`);

              } else {
                let filesList = '';
                if (analysis) {
                  filesList = '\n\n**Changed files:**\n';
                  const allFiles = [...analysis.docFiles, ...analysis.otherFiles];
                  allFiles.slice(0, 10).forEach(f => {
                    filesList += `- \`${f.filename}\` (+${f.additions}/-${f.deletions})\n`;
                  });
                  if (allFiles.length > 10) {
                    filesList += `- ... and ${allFiles.length - 10} more\n`;
                  }
                }

                const commentLines = [
                  '## ✅ Issue Resolved - Auto-Closed (No Automation Required)',
                  '',
                  '**Status**: This issue has been fixed with documentation/configuration changes only.',
                  '',
                  `- ✅ **Fix merged**: PR #${fixPR.number} (${fixPR.url})`,
                  `- ℹ️  **Analysis**: ${reasoning}`,
                  '- ✓ **No E2E test required** for this type of change',
                  filesList,
                  '',
                  'The fix has been implemented and does not require additional test automation.',
                  '',
                  '---',
                  `*🤖 Automated by [Issue Audit Workflow](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`
                ];
                const comment = commentLines.join('\n');

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: comment
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });

                console.log(`  ✓ Closed issue (doc-only fix)`);
              }
            }

      - name: Generate audit report
        uses: actions/github-script@v7
        env:
          RESULTS_JSON: ${{ steps.audit.outputs.results }}
          ENRICHED_ITEMS_JSON: ${{ steps.analyze-files.outputs.enriched_needs_test }}
          DRY_RUN: ${{ inputs.dry_run }}
          TEST_MODE: ${{ inputs.test_mode }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = JSON.parse(process.env.RESULTS_JSON);

            const dryRun = process.env.DRY_RUN === 'true';
            const testMode = process.env.TEST_MODE || 'all';

            let report = `# Issue Audit Report\n\n`;
            report += `**Run ID**: ${context.runId}\n`;
            report += `**Date**: ${new Date().toISOString()}\n`;
            if (dryRun) {
              report += `**Mode**: 🧪 DRY RUN (no actions taken)\n`;
            }
            if (testMode !== 'all') {
              report += `**Test Mode**: Issues ${testMode}\n`;
            }
            report += `\n---\n\n`;

            // Summary table
            report += `## Summary\n\n`;
            report += `| Category | Count |\n`;
            report += `|----------|-------|\n`;
            report += `| ✅ Auto-closed (fix + test) | ${results.ready_to_close.length} |\n`;
            report += `| ⚠️  Needs test | ${results.needs_test.length} |\n`;
            report += `| ⚠️  Needs fix | ${results.needs_fix.length} |\n`;
            report += `| ❌ Needs both | ${results.needs_both.length} |\n`;
            report += `| **Total audited** | **${results.ready_to_close.length + results.needs_test.length + results.needs_fix.length + results.needs_both.length}** |\n\n`;

            // Details
            if (results.ready_to_close.length > 0) {
              report += `## ✅ Auto-Closed Issues (${results.ready_to_close.length})\n\n`;
              results.ready_to_close.forEach(item => {
                report += `- #${item.issue.number}: ${item.issue.title}\n`;
                report += `  - Fix: PR #${item.fixPR.number}\n`;
                report += `  - Test: \`${item.testFile}\`\n\n`;
              });
            }

            // Enhanced needs_test section with file analysis
            const enrichedItems = process.env.ENRICHED_ITEMS_JSON && process.env.ENRICHED_ITEMS_JSON !== ''
              ? JSON.parse(process.env.ENRICHED_ITEMS_JSON)
              : results.needs_test;

            if (enrichedItems.length > 0) {
              report += `## ⚠️  Issues Needing Tests - File Analysis (${enrichedItems.length})\n\n`;

              let needsAutomationCount = 0;
              let docOnlyCount = 0;

              enrichedItems.forEach(item => {
                const analysis = item.fileAnalysis;
                const needsAutomation = !analysis ||
                  !(analysis.summary.hasDocOnly ||
                    (analysis.summary.isSmallChange && !analysis.summary.hasCode));

                if (needsAutomation) {
                  needsAutomationCount++;
                } else {
                  docOnlyCount++;
                }

                report += `### #${item.issue.number}: ${item.issue.title}\n`;
                report += `- **Fix**: PR #${item.fixPR.number} (merged ${item.fixPR.merged_at})\n`;
                report += `- **Decision**: ${needsAutomation ? '🔴 Needs Automation' : '🟢 Doc-Only (Auto-Close)'}\n`;

                if (analysis) {
                  report += `- **Files Changed**: ${analysis.totalFiles} (${analysis.codeFiles.length} code, ${analysis.docFiles.length} doc, ${analysis.otherFiles.length} other)\n`;
                  report += `- **Total Changes**: ${analysis.totalChanges} lines\n`;

                  if (analysis.codeFiles.length > 0) {
                    report += `- **Code Files**:\n`;
                    analysis.codeFiles.slice(0, 5).forEach(f => {
                      report += `  - \`${f.filename}\` (+${f.additions}/-${f.deletions})\n`;
                    });
                    if (analysis.codeFiles.length > 5) {
                      report += `  - ... and ${analysis.codeFiles.length - 5} more\n`;
                    }
                  }

                  if (analysis.docFiles.length > 0 && !needsAutomation) {
                    report += `- **Doc Files**:\n`;
                    analysis.docFiles.slice(0, 5).forEach(f => {
                      report += `  - \`${f.filename}\` (+${f.additions}/-${f.deletions})\n`;
                    });
                  }
                } else {
                  report += `- **Analysis**: Failed (defaulted to needs automation)\n`;
                }

                report += `\n`;
              });

              report += `\n**Breakdown**:\n`;
              report += `- 🔴 Needs Automation: ${needsAutomationCount}\n`;
              report += `- 🟢 Doc-Only (Auto-Close): ${docOnlyCount}\n\n`;
            }

            if (results.needs_fix.length > 0) {
              report += `## ⚠️  Issues with Tests but No Fix (${results.needs_fix.length})\n\n`;
              results.needs_fix.forEach(item => {
                report += `- #${item.issue.number}: ${item.issue.title}\n`;
                report += `  - Test exists: \`${item.testFile}\`\n`;
                report += `  - No merged PR found\n\n`;
              });
            }

            if (results.needs_both.length > 0) {
              report += `## ❌ Issues Needing Both Fix and Test (${results.needs_both.length})\n\n`;
              results.needs_both.forEach(item => {
                report += `- #${item.issue.number}: ${item.issue.title}\n`;
              });
            }

            report += `\n---\n`;
            report += `*Generated by Issue Audit Workflow*\n`;

            console.log(report);

            // Save report as artifact
            const fs = require('fs');
            fs.writeFileSync('issue-audit-report.md', report);

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: issue-audit-report
          path: issue-audit-report.md
          retention-days: 90
