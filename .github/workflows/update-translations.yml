# Copyright 2026 OpenObserve Inc.
name: Update Translations

on:
  push:
    branches:
      - main
    # Only run when the English source actually changes. Gating to `main` (instead
    # of every branch) prevents paying AWS Translate for the same strings on each
    # feature branch — the single largest cost driver of this job.
    paths:
      - 'web/src/locales/languages/en.json'
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to translate (space-separated, e.g., "fr es de"). Leave empty for all.'
        required: false
        default: ''
      force:
        description: 'Bypass the safety cap for large/intentional translation runs'
        required: false
        type: boolean
        default: false

# Cancel an in-progress run if a newer push to the same ref arrives, so we don't
# pay for superseded translation runs.
concurrency:
  group: update-translations-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-translations:
    name: Update translation files
    runs-on: ubuntu-latest

    # Only run on the main repo, not forks.
    if: github.repository == 'openobserve/openobserve'

    # Required for OIDC authentication with AWS and opening the translations PR.
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify AWS role secret is configured
        env:
          AWS_TRANSLATE_ROLE_ARN: ${{ secrets.AWS_TRANSLATE_ROLE_ARN }}
        run: |
          if [ -z "$AWS_TRANSLATE_ROLE_ARN" ]; then
            echo "::error::Secret AWS_TRANSLATE_ROLE_ARN is not set. Add the IAM role ARN as a repository secret."
            exit 1
          fi

      - name: Configure AWS Credentials with IAM Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TRANSLATE_ROLE_ARN }}
          role-session-name: GitHubActions-TranslationWorkflow
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/translations/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/translations/requirements.txt

      - name: Run translation script
        id: run_translation
        # Inputs are passed as environment variables (not interpolated into the
        # script body) so user-controlled text can never be injected into the
        # shell. The script itself validates language codes against the supported
        # list before any AWS call (see main.py).
        env:
          INPUT_LANGUAGES: ${{ github.event.inputs.languages }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          cd scripts/translations
          ARGS=()
          if [ -n "$INPUT_LANGUAGES" ]; then
            read -ra REQUESTED <<< "$INPUT_LANGUAGES"
            ARGS+=("${REQUESTED[@]}")
          fi
          if [ "$INPUT_FORCE" = "true" ]; then
            ARGS+=("--force")
          fi
          echo "Running translation with args: ${ARGS[*]}"
          python3 main.py "${ARGS[@]}"

      - name: Check for translation changes
        id: check_changes
        # Use `git status --porcelain` (not `git diff`) so brand-new untracked
        # files — e.g. a freshly created .translation_state.json or a new locale
        # file — are detected, not just modifications to already-tracked files.
        run: |
          PATHS="web/src/locales/languages/ scripts/translations/.translation_state.json"
          if [ -n "$(git status --porcelain -- $PATHS)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Translation changes detected:"
            git status --porcelain -- $PATHS
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No translation changes detected"
          fi

      # `main` is a protected branch, so a direct `git push` from GITHUB_TOKEN is
      # rejected (this is why earlier runs failed on the push step). Open a PR
      # with the generated translations instead. Requires the repo setting
      # "Allow GitHub Actions to create and approve pull requests" to be enabled
      # (Settings → Actions → General → Workflow permissions).
      - name: Create pull request with translation updates
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-translations
          delete-branch: true
          add-paths: |
            web/src/locales/languages/*.json
            scripts/translations/.translation_state.json
          commit-message: |
            chore: update translations from en.json

            Auto-generated translation updates from English source file.

            🤖 Generated with automated translation workflow
          title: "chore: update translations from en.json"
          body: |
            Auto-generated translation updates from the English source file
            (`web/src/locales/languages/en.json`).

            🤖 Generated with automated translation workflow
          labels: translations

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.run_translation.outcome }}" != "success" ]; then
            echo "❌ Translation script did not complete successfully (outcome: ${{ steps.run_translation.outcome }}). See the 'Run translation script' step logs."
            exit 0
          fi
          if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
            echo "✅ Translations updated — pull request created/updated (branch: chore/update-translations)."
          else
            echo "ℹ️  No new or modified keys — translations already up to date."
          fi
