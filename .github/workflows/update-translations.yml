# Copyright 2026 OpenObserve Inc.
name: Update Translations

on:
  push:
    branches:
      - main
    # Only run when the English source actually changes. Gating to `main` (instead
    # of every branch) prevents paying AWS Translate for the same strings on each
    # feature branch — the single largest cost driver of this job.
    paths:
      - 'web/src/locales/languages/en.json'
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to translate (space-separated, e.g., "fr es de"). Leave empty for all.'
        required: false
        default: ''
      force:
        description: 'Bypass the safety cap for large/intentional translation runs'
        required: false
        type: boolean
        default: false

# Cancel an in-progress run if a newer push to the same ref arrives, so we don't
# pay for superseded translation runs.
concurrency:
  group: update-translations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-translations:
    name: Update translation files
    runs-on: ubuntu-latest

    # Only run on the main repo, not forks.
    if: github.repository == 'openobserve/openobserve'

    # Required for OIDC authentication with AWS and pushing the commit back.
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials with IAM Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::058694856476:role/GitHubActionsRole
          role-session-name: GitHubActions-TranslationWorkflow
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/translations/requirements.txt

      - name: Install Python dependencies
        run: pip install -q -r scripts/translations/requirements.txt

      - name: Run translation script
        run: |
          cd scripts/translations
          ARGS="${{ github.event.inputs.languages }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running translation with args: $ARGS"
          python3 main.py $ARGS

      - name: Check for translation changes
        id: check_changes
        run: |
          if git diff --quiet web/src/locales/languages/ scripts/translations/.translation_state.json; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No translation changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Translation changes detected:"
            git diff --stat web/src/locales/languages/ scripts/translations/.translation_state.json
          fi

      - name: Commit and push translation updates
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add web/src/locales/languages/*.json scripts/translations/.translation_state.json

          git commit -m "chore: update translations from en.json

          Auto-generated translation updates from English source file.

          🤖 Generated with automated translation workflow"

          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
            echo "✅ Translations updated and committed."
          else
            echo "ℹ️  No new or modified keys — translations already up to date."
          fi
