name: initiate_enterprise_build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name for enterprise build check'
        required: true
        type: string
      commit_sha:
        description: 'Full commit SHA'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  GITHUB_HEAD_SHA: ${{ inputs.commit_sha }}

jobs:
  initiate_enterprise_build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          app-id: ${{ secrets.APP_ID }}
          # Set the owner, so the token can be used in all repositories
          owner: ${{ github.repository_owner }}
      - name: Set build short sha
        shell: bash
        run: |
          unset SHORT_COMMIT_ID
          echo "SHORT_COMMIT_ID=${GITHUB_HEAD_SHA:0:7}" >> $GITHUB_ENV
          echo "COMMIT_ID=${GITHUB_HEAD_SHA}" >> $GITHUB_ENV

      - name: Confirm git commit SHA output
        run: echo ${{ env.SHORT_COMMIT_ID }}

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
          BRANCH_NAME: ${{ inputs.branch }}
        with:
          token: ${{ env.TOKEN }} # GitHub App installation access token
          repository: openobserve/o2-enterprise
          event-type: initiate-enterprise-build
          client-payload: '{"o2_enterprise_repo": "${{ env.BRANCH_NAME }}", "o2_opensource_repo": "${{ env.BRANCH_NAME }}" ,"o2_commit_id": "${{ env.SHORT_COMMIT_ID }}", "o2_full_commit":"${{env.COMMIT_ID}}"}'
