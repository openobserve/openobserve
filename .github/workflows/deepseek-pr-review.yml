name: DeepSeek PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

env:
  REVIEW_MARKER: "<!-- deepseek-pr-review -->"

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository 
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_INPUT="${{ github.event.inputs.pr_number }}"
            if ! [[ "$PR_INPUT" =~ ^[1-9][0-9]*$ ]]; then
              echo "::error::Invalid PR number: $PR_INPUT"
              exit 1
            fi
            echo "pr_number=$PR_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find existing review comment
        id: find_comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments" \
            --jq '[.[] | select(.body | contains("deepseek-pr-review")) | .id] | last // empty')

          if [ -n "$COMMENT_ID" ]; then
            echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
            echo "Found existing review comment: $COMMENT_ID"
          else
            echo "comment_id=" >> "$GITHUB_OUTPUT"
            echo "No existing review comment found, will create new one"
          fi

      - name: Get PR diff and commits
        id: pr_context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"

          gh pr diff "$PR_NUMBER" > /tmp/pr_diff.txt

          gh pr view "$PR_NUMBER" --json commits --jq '[.commits[] | {sha: .oid, author: .authors[0].login, message: .messageHeadline}]' > /tmp/pr_commits.json

          echo "diff_lines=$(wc -l < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"

      - name: Request DeepSeek Review
        id: deepseek_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          EXISTING_COMMENT_ID="${{ steps.find_comment.outputs.comment_id }}"

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" \
              --jq '.body' > /tmp/existing_body.txt
          else
            printf '' > /tmp/existing_body.txt
          fi

          cat > /tmp/instructions.txt <<'ENDINSTRUCTIONS'
          ## Pull Request Review

          **Repository:** ${{ github.repository }}
          **PR Number:** __PR_NUMBER__

          ### Commits
          ```json
          __PR_COMMITS__
          ```

          ### PR Diff
          ```diff
          __DIFF__
          ```

          ### Existing Review Comment (if any)
          __EXISTING_BODY__

          ---

          ## Review Instructions

          This is a pull request review. Your task is to identify bugs, security issues, structural problems, and performance concerns in the changes above.

          ### Before You Start

          Diffs alone are not enough. Use the diff to identify which files changed, then consider how the changes interact with each other. Look at the file paths to understand the architecture. Code that looks wrong in isolation may be correct given surrounding logic — and vice versa. Pay attention to existing patterns visible in the diff context lines.

          ### Review Categories

          1. **Bugs** (primary) — logic errors, off-by-one, incorrect conditionals, missing guards, broken error handling, edge cases (null/empty inputs), security issues (injection, auth bypass, data exposure)
          2. **Structure** — does the code follow existing patterns? Are there established abstractions it should use but doesn't? Excessive nesting?
          3. **Performance** — only flag if obviously problematic (O(n²) on unbounded data, N+1 queries, blocking I/O on hot paths)
          4. **Behavioral Changes** — raise if a behavioral change appears unintentional

          ### Before You Flag

          - Be certain. If unsure about something, skip it. Do not invent hypothetical problems.
          - Only review the changes — do not review pre-existing code that wasn't modified.
          - Don't be a zealot about style. Only flag style if it clearly violates established conventions. Do NOT flag cosmetic formatting, doc changes, or trivial improvements.
          - Never guess about compile errors, ownership semantics, or runtime behavior you cannot verify from the diff.
          - AVOID flattery. No "Great job", "Thanks for", or any non-helpful commentary.

          ### Output Format

          Output ONLY the review content — no preamble, no "Here is the review", no extra text.

          If issues found:
          ```
          <!-- deepseek-pr-review -->
          ## Code Review

          | Severity | File:Line | Issue | Fix |
          |----------|-----------|-------|-----|
          | High | `path/file.rs:42` | Logic error: condition reversed, causing early return when data is valid | Swap `is_err()` to `is_ok()` to proceed on success |
          ```

          If no issues found:
          ```
          <!-- deepseek-pr-review -->
          ## Code Review

          **LGTM** — No bugs, security, or performance issues found.
          ```

          Rules:
          - Output ONLY the `<!-- deepseek-pr-review -->` marker followed by review content
          - Severity: High, Medium, Low. Do not overstate.
          - File:Line: backtick-wrapped path, e.g. `path/file.rs:42`
          - Issue and Fix: 1-2 sentences each, matter-of-fact, no markdown headers or bold
          - Max 10 issues, sorted by severity (high first)
          - If existing review shows resolved issues, append `### Resolved` with ~~strikethrough~~
          - NO emojis anywhere
          - Be direct about why something is a bug; describe the realistic scenario where it breaks
          ENDINSTRUCTIONS

          SYSTEM_PROMPT="You are a code reviewer. Your job is to review code changes and provide actionable feedback. Diffs alone are not enough — understand the surrounding patterns, conventions, and control flow before flagging anything. Code that looks wrong in isolation may be correct given surrounding logic, and vice versa.

          WHAT TO LOOK FOR (in priority order):

          1. BUGS — Your primary focus.
          - Logic errors, off-by-one mistakes, incorrect conditionals
          - If-else guards: missing guards, incorrect branching, unreachable code paths
          - Edge cases: null/empty/undefined inputs, error conditions, race conditions
          - Security issues: injection, auth bypass, data exposure
          - Broken error handling that swallows failures, throws unexpectedly or returns error types that are not caught

          2. STRUCTURE — Does the code fit the codebase?
          - Does it follow existing patterns and conventions?
          - Are there established abstractions it should use but doesn't?
          - Excessive nesting that could be flattened with early returns or extraction

          3. PERFORMANCE — Only flag if obviously problematic.
          - O(n^2) on unbounded data, N+1 queries, blocking I/O on hot paths

          4. BEHAVIORAL CHANGES — If a behavioral change is introduced, raise it (especially if possibly unintentional).

          BEFORE YOU FLAG SOMETHING:

          BE CERTAIN. If you're going to call something a bug, you need to be confident it actually is one.
          - Only review the changes — do not review pre-existing code that wasn't modified
          - Don't flag something as a bug if you're unsure — skip it
          - Don't invent hypothetical problems — if an edge case matters, explain the realistic scenario where it breaks
          - If a change appears intentional (rename, format change, API update), do not flag it
          - Never guess about compile errors, ownership semantics, or runtime behavior you cannot verify from the diff
          - If you need more context to be sure, acknowledge the uncertainty rather than flagging

          DON'T BE A ZEALOT ABOUT STYLE:
          - Only flag style when the code clearly violates established project conventions
          - Don't complain about else statements if early returns are already being used correctly
          - Some 'violations' are acceptable when they're the simplest option
          - Excessive nesting is a legitimate concern regardless of other style choices
          - Do NOT flag: cosmetic formatting, doc changes, trivial improvements, or anything you are not confident is wrong

          OUTPUT GUIDELINES:
          - Be direct and clear about why something is a bug; communicate the realistic scenario where it breaks
          - Clearly communicate severity of issues — do not overstate severity
          - Your tone should be matter-of-fact, not accusatory or overly positive
          - Write so the reader can quickly understand the issue without reading too closely
          - AVOID flattery — no 'Great job', 'Thanks for', or any comments that are not helpful to the reader
          - Max 10 issues, sorted by severity (high first)"

          RESPONSE=$(jq -n \
            --arg model "deepseek-chat" \
            --arg sys "$SYSTEM_PROMPT" \
            --arg pr_number "$PR_NUMBER" \
            --rawfile instructions /tmp/instructions.txt \
            --rawfile pr_commits /tmp/pr_commits.json \
            --rawfile diff /tmp/pr_diff.txt \
            --rawfile existing_body /tmp/existing_body.txt \
            '{
              model: $model,
              messages: [
                {role: "system", content: $sys},
                {role: "user", content: ($instructions |
                  gsub("__PR_NUMBER__"; $pr_number) |
                  gsub("__PR_COMMITS__"; $pr_commits) |
                  gsub("__DIFF__"; $diff) |
                  gsub("__EXISTING_BODY__"; $existing_body)
                )}
              ],
              temperature: 0.0,
              max_tokens: 8192
            }' | curl -s https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
              -d @-)

          REVIEW_BODY=$(printf '%s' "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$REVIEW_BODY" ]; then
            echo "DeepSeek API returned empty response"
            echo "Error: $(printf '%s' "$RESPONSE" | jq -r '.error.message // "unknown error"')"
            exit 1
          fi

          printf '%s\n' "$REVIEW_BODY" > /tmp/review_body.txt

      - name: Post or Update Review Comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_COMMENT_ID="${{ steps.find_comment.outputs.comment_id }}"

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            jq -Rs '{body: .}' /tmp/review_body.txt > /tmp/review_payload.json
            gh api "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" \
              -X PATCH --input /tmp/review_payload.json
            echo "Updated existing review comment: $EXISTING_COMMENT_ID"
          else
            gh pr comment "${{ steps.pr.outputs.pr_number }}" --body-file /tmp/review_body.txt
            echo "Created new review comment"
          fi
