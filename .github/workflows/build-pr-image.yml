name: Build PR Docker Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (e.g., feature/my-branch)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.branch }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  build_frontend:
    name: build_frontend
    runs-on: ubuntu-latest
    steps:
      - name: Clone the current repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend code
        run: cd web && npm ci && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  build_pr_image_amd64:
    name: build_pr_image_amd64
    needs: [build_frontend]
    permissions:
      id-token: write
      contents: read
      packages: write
    runs-on: ubicloud-standard-8
    steps:
      - name: Remove unused tools
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Clone the current repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-11-11

      - name: Rust cache
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "openobserve-${{ runner.arch }}"

      - name: Install Protoc
        run: |
          bash ./.github/protoc.sh

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Validate cache setup
        run: |
          echo "Rust cache hit: ${{ steps.rust-cache.outputs.cache-hit }}"
          if [ ! -d "web/dist" ]; then
            echo "ERROR: web/dist not found"
            exit 1
          fi
          echo "web/dist exists"
          if [ -d "target" ]; then
            echo "target/ exists"
            libconfig_count=$(find target -name "libconfig-*.rlib" 2>/dev/null | wc -l)
            libinfra_count=$(find target -name "libinfra-*.rlib" 2>/dev/null | wc -l)
            echo "libconfig rlibs: $libconfig_count, libinfra rlibs: $libinfra_count"
            if [ "${{ steps.rust-cache.outputs.cache-hit }}" == "true" ] && [ "$libconfig_count" -eq 0 ]; then
              echo "WARNING: cache hit claimed but no cached artifacts found"
            fi
          fi

      - name: Print rustc cfg
        run: rustc -C target-cpu=native --print cfg

      - name: Build and run binary
        run: |
          echo "Building openobserve for x86_64..."
          cargo build --features mimalloc --profile release-profiling --target x86_64-unknown-linux-gnu
          mkdir -p bin
          mv target/x86_64-unknown-linux-gnu/release-profiling/openobserve bin/openobserve

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::058694856476:role/GitHubActionsRole
          role-session-name: GithubActionsSession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set GIT_TAG env
        run: |
          echo "GIT_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          echo "GIT_HASH=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: deploy/build/Dockerfile.pr
          context: .
          tags: |
            public.ecr.aws/zinclabs/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-amd64
            ghcr.io/openobserve/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-amd64
          push: true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          platforms: linux/amd64

  build_pr_image_arm64:
    name: build_pr_image_arm64
    needs: [build_frontend]
    permissions:
      id-token: write
      contents: read
      packages: write
    runs-on: "ubicloud-standard-16-arm"
    steps:
      - name: Remove unused tools
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Clone the current repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-11-11

      - name: Rust cache
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "openobserve-${{ runner.arch }}"

      - name: Install Protoc
        run: |
          bash ./.github/protoc.sh

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Validate cache setup
        run: |
          echo "Rust cache hit: ${{ steps.rust-cache.outputs.cache-hit }}"
          if [ ! -d "web/dist" ]; then
            echo "ERROR: web/dist not found"
            exit 1
          fi
          echo "web/dist exists"
          if [ -d "target" ]; then
            echo "target/ exists"
            libconfig_count=$(find target -name "libconfig-*.rlib" 2>/dev/null | wc -l)
            libinfra_count=$(find target -name "libinfra-*.rlib" 2>/dev/null | wc -l)
            echo "libconfig rlibs: $libconfig_count, libinfra rlibs: $libinfra_count"
            if [ "${{ steps.rust-cache.outputs.cache-hit }}" == "true" ] && [ "$libconfig_count" -eq 0 ]; then
              echo "WARNING: cache hit claimed but no cached artifacts found"
            fi
          fi

      - name: Print rustc cfg
        run: rustc -C target-cpu=native --print cfg

      - name: Build and run binary
        run: |
          echo "Building openobserve for aarch64..."
          cargo build --features mimalloc --profile release-profiling --target aarch64-unknown-linux-gnu
          mkdir -p bin
          mv target/aarch64-unknown-linux-gnu/release-profiling/openobserve bin/openobserve

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::058694856476:role/GitHubActionsRole
          role-session-name: GithubActionsSession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set GIT_TAG env
        run: |
          echo "GIT_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          echo "GIT_HASH=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: deploy/build/Dockerfile.pr
          context: .
          tags: |
            public.ecr.aws/zinclabs/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-arm64
            ghcr.io/openobserve/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-arm64
          push: true
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          platforms: linux/arm64

  build:
    needs: [build_pr_image_amd64, build_pr_image_arm64]
    if: ${{ needs.build_pr_image_amd64.result == 'success' && needs.build_pr_image_arm64.result == 'success' }}
    runs-on: ubicloud-standard-16-arm
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Clone the current repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - name: Set GIT_TAG env
        run: |
          echo "GIT_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          echo "GIT_HASH=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::058694856476:role/GitHubActionsRole
          role-session-name: GithubActionsSession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: int128/docker-manifest-create-action@v2
        with:
          tags: |
            public.ecr.aws/zinclabs/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}
          sources: |
            public.ecr.aws/zinclabs/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-amd64
            public.ecr.aws/zinclabs/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-arm64

      - uses: int128/docker-manifest-create-action@v2
        with:
          tags: |
            ghcr.io/openobserve/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}
          sources: |
            ghcr.io/openobserve/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-amd64
            ghcr.io/openobserve/openobserve-dev:${{ env.GIT_TAG }}-${{ env.GIT_HASH}}-arm64

  build_pr_image_summary:
    runs-on: ubuntu-latest
    permissions: {}
    needs: [build_pr_image_amd64, build_pr_image_arm64, build]
    if: always()
    steps:
      - name: Check build results
        run: |
          if [ "${{ needs.build_pr_image_amd64.result }}" == "success" ] || [ "${{ needs.build_pr_image_amd64.result }}" == "skipped" ]; then
            echo "AMD64 build passed or skipped"
          else
            echo "AMD64 build failed"
            exit 1
          fi

          if [ "${{ needs.build_pr_image_arm64.result }}" == "success" ] || [ "${{ needs.build_pr_image_arm64.result }}" == "skipped" ]; then
            echo "ARM64 build passed or skipped"
          else
            echo "ARM64 build failed"
            exit 1
          fi

          if [ "${{ needs.build.result }}" == "success" ] || [ "${{ needs.build.result }}" == "skipped" ]; then
            echo "Manifest build passed or skipped"
          else
            echo "Manifest build failed"
            exit 1
          fi

          echo "All builds completed successfully"
